<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Physio Befund Generator</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #output {
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 15px;
      margin-top: 20px;
      border-radius: 8px;
      min-height: 100px;
    }
  </style>
</head>

<body>

<h2>Physio Befund Generator</h2>

<textarea id="input" placeholder="Schmerz, ROM, Kraft, Funktion..."></textarea>

<br>

<button onclick="generate()">Generate</button>

<div id="output">Output appears here...</div>

<script>
async function generate() {
  const input = document.getElementById("input").value;
  const output = document.getElementById("output");

  output.innerText = "Generating...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: "Erstelle einen physiotherapeutischen Befund:\n" + input
      })
    });

    const data = await res.json();

    // ✅ FIX 2: SAFE OUTPUT HANDLING
    if (data.raw) {
      output.innerText = data.raw; // backend returned non-JSON safely
    } else if (Array.isArray(data) && data[0]?.generated_text) {
      output.innerText = data[0].generated_text;
    } else if (data.error) {
      output.innerText = "Error: " + data.error;
    } else {
      output.innerText = JSON.stringify(data, null, 2);
    }

  } catch (err) {
    output.innerText = "Frontend error: " + err.message;
  }
}
</script>

</body>
</html>
